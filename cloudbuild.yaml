steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - faculty-appraisal-java
      - --image=asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=faculty-appraisal-java:asia-south1:faculty-appraisal-db
      - --set-env-vars=DATABASE_URL=jdbc:postgresql:///faculty_appraisal,DB_USERNAME=postgres,USE_LOCAL_STORAGE=true
      - --set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest

images:
  - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest