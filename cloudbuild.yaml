steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - faculty-appraisal-java
      - --image=asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=faculty-appraisal-java:asia-south1:faculty-appraisal-db

images:
  - asia-south1-docker.pkg.dev/faculty-appraisal-java/faculty-appraisal-repo/faculty-appraisal-java:latest