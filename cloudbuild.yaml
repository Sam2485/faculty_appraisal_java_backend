steps:
  # Pull :latest for layer cache (fail-safe — ignore if image doesn't exist yet)
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    entrypoint: bash
    args:
      - -c
      - docker pull $_IMAGE:latest || true

  # Build the Spring Boot image (Maven runs inside the multi-stage Dockerfile)
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [pull-cache]
    args:
      - build
      - --cache-from=$_IMAGE:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - -t=$_IMAGE:latest
      - -t=$_IMAGE:$COMMIT_SHA
      - .
    env:
      - DOCKER_BUILDKIT=1

  # Push :latest — deploy step needs this image to exist first
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    waitFor: [build]
    args: [push, '$_IMAGE:latest']

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-latest]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - faculty-appraisal-java-backend
      - --image=$_IMAGE:latest
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=facultyappraisal-495011:asia-south1:faculty-appraisal-db
      # Non-sensitive env vars (DATABASE_URL uses postgres-socket-factory dep in pom.xml)
      - --update-env-vars=DATABASE_URL=jdbc:postgresql:///faculty_appraisal?cloudSqlInstance=facultyappraisal-495011:asia-south1:faculty-appraisal-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory,DB_USERNAME=app_user,APP_URL=https://faculty-appraisal-java-backend-376777978967.asia-south1.run.app,USE_LOCAL_STORAGE=false,GCP_STORAGE_BUCKET=faculty-appraisal-uploads,GCP_PROJECT_ID=facultyappraisal-495011,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_USER=appraisal@dypiu.ac.in,MAIL_FROM=appraisal@dypiu.ac.in,FRONTEND_URL=https://faculty-appraisal-frontend-376777978967.asia-south1.run.app,ALLOW_MOCK_USER=false
      # Sensitive values — pulled from GCP Secret Manager at deploy time
      # Create these once with the commands in the README before first deploy
      - --update-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest
      - --quiet

  # Push :COMMIT_SHA in parallel with deploy for traceability
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    waitFor: [push-latest]
    args: [push, '$_IMAGE:$COMMIT_SHA']

substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/facultyappraisal-495011/faculty-appraisal-repo/faculty-appraisal-java

images:
  - $_IMAGE:latest
  - $_IMAGE:$COMMIT_SHA

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
