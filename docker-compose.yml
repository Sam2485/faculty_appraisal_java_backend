services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/faculty_appraisal
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: local-dev-secret-change-in-production-32-chars-min
      USE_LOCAL_STORAGE: "true"
      ALLOW_MOCK_USER: "false"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: faculty_appraisal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  uploads:
